server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://ceil-beace9akhxdehvbz.germanywestcentral-01.azurewebsites.net/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host ceil-beace9akhxdehvbz.germanywestcentral-01.azurewebsites.net;
        proxy_cache_bypass $http_upgrade;
    }
}