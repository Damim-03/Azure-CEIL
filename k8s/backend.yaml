apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ceil-backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@db:5432/mydb
            - name: SESSION_SECRET
              value: session_secret_key
            - name: REFRESH_SECRET
              value: super_strong_refresh_secret
            - name: SESSION_EXPIRES_IN
              value: 1d
            - name: GOOGLE_CLIENT_ID
              value: "631352520680-7p5j107rq74egkdki1ve2n8fseqvqg3q.apps.googleusercontent.com"
            - name: GOOGLE_CLIENT_SECRET
              value: "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"
            - name: GOOGLE_CALLBACK_URL
              value: "http://localhost:8080/api/auth/google/callback"
            - name: FRONTEND_ORIGIN
              value: "http://localhost"
            - name: FRONTEND_GOOGLE_CALLBACK_URL
              value: "http://localhost/auth/google/callback"
            - name: SERVE_FRONTEND
              value: "false"
            - name: CLOUDINARY_CLOUD_NAME
              value: "dckcbn9ry"
            - name: CLOUDINARY_API_KEY
              value: "793451346135567"
            - name: CLOUDINARY_API_SECRET
              value: "nzfB9px056tcBI4bKBtx1XZY_Ew"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
